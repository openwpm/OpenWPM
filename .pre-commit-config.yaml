repos:
  - repo: https://github.com/timothycrosley/isort
    rev: 8.0.1
    hooks:
      - id: isort
  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        language_version: python3
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        additional_dependencies:
          [pytest, types-tabulate, types-PyYAML, types-redis]
        # We may need to add more and more dependencies here, as pre-commit
        # runs in an environment without our dependencies
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.11.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
  - repo: local
    hooks:
      - id: check-environment-pins
        name: Validate environment.yaml pins match unpinned sources
        entry: python scripts/manage-environment.py check
        language: python
        language_version: python3
        files: (^environment\.yaml$|^scripts/environment-unpinned|^scripts/manage-environment\.py$)
        additional_dependencies: [pyyaml]
        pass_filenames: false
      - id: extension-eslint
        name: Lint extension sources with ESLint
        entry: bash -c 'cd Extension && npm run --silent lint:eslint'
        language: system
        files: ^Extension/src/.*\.(ts|tsx|js|mjs)$
        pass_filenames: false
