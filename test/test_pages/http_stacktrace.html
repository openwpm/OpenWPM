<!doctype html>
<html>
<head>
<title>async load by script</title>
  <script type="application/javascript">
    // 1) SYNC, script-initiated request. Injecting a <script> via appendChild
    // issues the request for its src synchronously from JS, so the call stack
    // instrument captures the full initiator stack via Components.stack in the
    // content process (inject_js -> inject_all -> onload).
    function inject_js() {
      var js = window.document.createElement("script");
      js.setAttribute("async", "true");
      js.type = "text/javascript";
      js.src = "shared/inject_pixel.js";
      window.document.body.appendChild(js);
    }
    // 2) ASYNC, fetch-initiated request. fetch() opens its channel off the JS
    // stack, so Components.stack is empty; Firefox instead delivers the initiator
    // stack via the network-monitor-alternate-stack notification, which the
    // parent actor deserializes into the same callstacks-table format.
    function inject_fetch() {
      fetch("shared/test_script.js");
    }
    // 3) ASYNC, XHR-initiated request. Like fetch, the XHR channel is opened off
    // the JS stack and its initiator stack arrives via the alternate-stack path.
    function inject_xhr() {
      var xhr = new XMLHttpRequest();
      xhr.open("GET", "shared/test_image_2.png");
      xhr.send();
    }
    function inject_all() {
      inject_js();
      inject_fetch();
      inject_xhr();
    }
  </script>
 </head>
 <body onload="inject_all()">
 <p> The script on this page injects a script, a fetch and an XHR.</p>
 </body></html>
