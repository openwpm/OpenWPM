<!DOCTYPE html>
<html>
<head>
    <title>OpenWPM Stealth — recursive instrumentation probe</title>
</head>
<body>
    <div id="results"></div>
    <script>
    /*
     * Exercises the recursive + depth logSettings. The test config instruments
     * a honey object property on Navigator with recursive:true, depth:3.
     *
     * Stealth recurses LAZILY into the object a getter returns (legacy
     * "recurse into objects returned by instrumented properties"), instrumenting
     * its own properties one level down, decrementing depth. So accessing nested
     * leaves of the returned object is captured under the recursive symbol path
     * <instrumentedName>.openwpmRecObj.inner.leaf.
     *
     * The page builds the nested object AT RUNTIME, after document_start; lazy
     * recursion reaches it precisely because it runs at access time.
     */
    var results = {};

    // Seed a nested object on the honey property.
    navigator.openwpmRecObj = { inner: { leaf: "deep-value" } };

    // Walk it: each get descends one recursion level. Reading the leaf scalar
    // is the access we assert was captured.
    var top = navigator.openwpmRecObj;       // get -> recurse into {inner}
    var inner = top.inner;                    // get -> recurse into {leaf}
    var leaf = inner.leaf;                    // get of the scalar leaf
    results.leaf_roundtrips = leaf === "deep-value";

    var resultsDiv = document.getElementById("results");
    resultsDiv.setAttribute("data-results", JSON.stringify(results));
    resultsDiv.textContent = JSON.stringify(results, null, 2);
    </script>
</body>
</html>
