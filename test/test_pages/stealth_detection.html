<!DOCTYPE html>
<html>
<head>
    <title>OpenWPM Stealth Detection Tests</title>
</head>
<body>
    <h1>Stealth Detection Tests</h1>
    <canvas id="canvas" width="200" height="200"></canvas>
    <div id="results"></div>
    <script>
    /**
     * Detection tests based on Krumnow et al.'s research on detecting OpenWPM.
     * Each test returns true if the browser appears "normal" (undetectable).
     * A stealth-enabled OpenWPM should pass all tests.
     * A regular OpenWPM (with js_instrument) will fail some.
     */
    const results = {};

    // Test 1: navigator.webdriver should be false/undefined in a normal browser
    // Selenium sets this to true by default
    function testWebdriverFlag() {
        return navigator.webdriver !== true;
    }

    // Test 2: Check that common instrumented functions still appear native
    // OpenWPM's legacy JS instrument replaces native functions with JS wrappers
    // which changes their toString() output
    function isNative(fn) {
        try {
            return Function.prototype.toString.call(fn).indexOf("[native code]") !== -1;
        } catch(e) {
            return false;
        }
    }

    function testCanvasFunctionsNative() {
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        return isNative(canvas.toDataURL) &&
               isNative(canvas.getContext) &&
               isNative(ctx.fillText) &&
               isNative(ctx.fillRect);
    }

    // Test 3: Check that Storage functions still appear native
    function testStorageFunctionsNative() {
        return isNative(window.localStorage.getItem) &&
               isNative(window.localStorage.setItem) &&
               isNative(window.sessionStorage.getItem) &&
               isNative(window.sessionStorage.setItem);
    }

    // Test 4: Check Navigator functions still appear native
    function testNavigatorNative() {
        // Check that the getter for userAgent is native
        const desc = Object.getOwnPropertyDescriptor(Navigator.prototype, "userAgent");
        if (!desc || !desc.get) return false;
        return isNative(desc.get);
    }

    // Test 5: Check that no OpenWPM-specific globals are leaked
    function testNoGlobalLeaks() {
        return typeof window.jsInstruments === "undefined" &&
               typeof window.instrumentFingerprintingApis === "undefined" &&
               typeof window.getInstrumentJS === "undefined";
    }

    // Test 6: Check that constructor properties are preserved on instrumented objects
    // OpenWPM's legacy instrument sometimes removes constructors
    function testConstructorsPresent() {
        const canvas = document.getElementById("canvas");
        return typeof canvas.constructor !== "undefined" &&
               typeof canvas.__proto__.constructor !== "undefined" &&
               typeof window.localStorage.constructor !== "undefined" &&
               typeof window.sessionStorage.constructor !== "undefined";
    }

    // Test 7: Check Function.prototype.bind integrity
    // Bot detection uses this as a tamper check
    function testBindIntegrity() {
        if (!Function.prototype.bind) return false;
        try {
            const bindStr = Function.prototype.bind.toString().replace(/bind/g, "Error");
            const errorStr = Error.toString();
            return bindStr === errorStr;
        } catch(e) {
            return false;
        }
    }

    // Test 8: Error stack traces should not contain moz-extension:// URLs
    function testCleanErrorStacks() {
        try {
            // Force an error to capture a stack trace
            null[0]();
        } catch(e) {
            const stack = e.stack || "";
            return stack.indexOf("moz-extension://") === -1;
        }
        return true;
    }

    // Test 9: Detect prototype pollution from ancestor-prototype flattening.
    //
    // The legacy instrument, when given an empty propertiesToInstrument list,
    // calls Object.getPropertyNames(object) — which it (re)defines to walk the
    // ENTIRE prototype chain and concatenate every ancestor's own-property
    // names (lib/js-instruments.ts) — then Object.defineProperty()s each name
    // back onto the FIRST object. The fingerprinting collection instruments
    // CanvasRenderingContext2D with only excludedProperties set (empty
    // propertiesToInstrument), so under legacy the methods that legitimately
    // live on Object.prototype (hasOwnProperty, valueOf, isPrototypeOf,
    // propertyIsEnumerable, toLocaleString) get flattened DOWN onto
    // CanvasRenderingContext2D.prototype as OWN properties.
    //
    // In a clean Firefox (and under the stealth per-prototype instrument)
    // those names are NOT own properties of CanvasRenderingContext2D.prototype
    // — they are inherited from Object.prototype. We assert that invariant: a
    // browser is "normal" (returns true) iff none of Object.prototype's own
    // methods have leaked down as own properties of an instrumented prototype.
    function testNoExtraPrototypeProperties() {
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const proto = Object.getPrototypeOf(ctx); // CanvasRenderingContext2D.prototype

        // Names that exist on Object.prototype but must NOT be own properties
        // of CanvasRenderingContext2D.prototype in an un-flattened chain.
        const ancestorOnly = Object.getOwnPropertyNames(Object.prototype).filter(
            (name) => name !== "constructor",
        );
        for (const name of ancestorOnly) {
            if (Object.prototype.hasOwnProperty.call(proto, name)) {
                // An Object.prototype member leaked down onto an instrumented
                // prototype as an own property — the flattening artifact.
                return false;
            }
        }
        return true;
    }

    // Test 10b: Instrumented functions must report the SAME arity (.length) as
    // the native function they replace. A naive wrapper forwards via
    // `arguments` and therefore has .length === 0, whereas e.g.
    // canvas.getContext.length === 1 natively — a fingerprint. Stealth copies
    // the native arity onto the exported wrapper, so every check must hold.
    // Expected arities are the stable, spec-defined declared-argument counts.
    function testFunctionArityNative() {
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const checks = [
            [canvas.toDataURL, 0],     // toDataURL([type[, quality]])
            [canvas.getContext, 1],    // getContext(contextType[, options])
            [ctx.fillText, 3],         // fillText(text, x, y[, maxWidth])
            [ctx.fillRect, 4],         // fillRect(x, y, width, height)
            [window.localStorage.getItem, 1],
            [window.localStorage.setItem, 2],
            [window.sessionStorage.getItem, 1],
            [window.sessionStorage.setItem, 2],
        ];
        return checks.every(([fn, arity]) => typeof fn === "function" && fn.length === arity);
    }

    // Test 10c: Instrumented ACCESSORS must report the SAME function .name as
    // the native accessor they replace. Native accessor functions are named with
    // the spec prefix — Object.getOwnPropertyDescriptor(Navigator.prototype,
    // "userAgent").get.name === "get userAgent". A naive computed-accessor wrapper
    // (`get [propertyName]()`) is named the BARE property ("userAgent"), and
    // exportFunction's defineAs also sets the bare name — so .get.name === "userAgent"
    // is a one-line detector latent on EVERY wrapped accessor. Stealth restores the
    // prefixed name via exportFunction's `defineAs` (passing the spec-prefixed
    // "get <prop>"/"set <prop>" name in instrument.ts), so every check must hold.
    function testAccessorNameNative() {
        const checks = [
            [Navigator.prototype, "userAgent", "get userAgent", null],
            [Navigator.prototype, "platform", "get platform", null],
            // window.name / localStorage / sessionStorage are native OWN accessors
            // on the window INSTANCE in Firefox (not on Window.prototype).
            [window, "name", "get name", "set name"],
            [window, "localStorage", "get localStorage", null],
            [window, "sessionStorage", "get sessionStorage", null],
        ];
        return checks.every(([obj, prop, getName, setName]) => {
            const desc = Object.getOwnPropertyDescriptor(obj, prop);
            if (!desc) return false;
            if (getName !== null) {
                if (typeof desc.get !== "function") return false;
                if (desc.get.name !== getName) return false;
            }
            if (setName !== null) {
                if (typeof desc.set !== "function") return false;
                if (desc.set.name !== setName) return false;
            }
            return true;
        });
    }

    // Test 10: Check RTCPeerConnection functions are native (if available)
    function testRTCNative() {
        if (typeof RTCPeerConnection === "undefined") return true;
        return isNative(RTCPeerConnection.prototype.createOffer) &&
               isNative(RTCPeerConnection.prototype.createDataChannel);
    }

    // Test 11: The stealth instrument's prototype-walk helpers
    // (getPrototypeByDepth, getPropertyNamesPerDepth, findPropertyInChain, and
    // getPropertyDescriptor) are plain MODULE-LOCAL functions in instrument.ts —
    // NOT installed on Object.prototype or the Object constructor. An earlier
    // revision exposed them on those prototypes; this test guards against that
    // regression. A page probing its OWN Object.prototype / Object must not see
    // any of them; if it does, the instrument is trivially detectable (returns
    // true = clean).
    function testNoInstrumentHelpersLeaked() {
        const protoHelpers = [
            "getPrototypeByDepth",
            "getPropertyNamesPerDepth",
            "findPropertyInChain",
        ];
        const protoNames = Object.getOwnPropertyNames(Object.prototype);
        for (const name of protoHelpers) {
            if (name in Object.prototype) return false;
            if (typeof Object.prototype[name] !== "undefined") return false;
            if (protoNames.indexOf(name) !== -1) return false;
        }
        // getPropertyDescriptor is added to the Object constructor itself
        const ctorNames = Object.getOwnPropertyNames(Object);
        if ("getPropertyDescriptor" in Object) return false;
        if (typeof Object.getPropertyDescriptor !== "undefined") return false;
        if (ctorNames.indexOf("getPropertyDescriptor") !== -1) return false;
        return true;
    }

    // D10: Frame-protection / DOM-hook detectability.
    //
    // The stealth instrument's inherited frame-protection layer (index.ts,
    // createProxyFunction) installs PAGE-FACING Proxy objects on page prototypes
    // for appendChild / document.write / window.open and the iframe
    // contentWindow getter, masking them by patching the MAIN-REALM
    // Function.prototype.toString. A page can probe each hook four ways:
    //   _native  -- same-realm Function.prototype.toString is "[native code]"
    //   _arity   -- fn.length equals the native arity
    //   _name    -- fn.name equals the native name
    //   _xrealm_native -- a Function.prototype.toString taken from a FRESH
    //                     same-origin iframe realm, called on the main-realm
    //                     hooked fn, still reports "[native code]".
    // The main-realm toString swap does NOT reach the iframe realm, so if the
    // hook is a Proxy/JS wrapper the cross-realm toString reveals it is not
    // native — the exact cross-realm tell the ADR calls "Wall 1". A clean
    // Firefox (and an ideally-undetectable stealth) returns true on EVERY key,
    // including _xrealm_native. Each result is recorded defensively per probe
    // (boolean, or "error:<msg>" if that single probe throws).
    function runFrameProtectionProbes() {
        // A separate realm: a same-origin about:blank iframe. Its realm-local
        // Function.prototype.toString and native members are the source of truth.
        const frame = document.createElement("iframe");
        frame.src = "about:blank";
        document.body.appendChild(frame);
        const iwin = frame.contentWindow;

        // The iframe realm's own Function.prototype.toString — used to inspect
        // the main-realm hooked fn from OUTSIDE the realm whose toString was
        // swapped.
        const xToString = iwin.Function.prototype.toString;

        // Native source-of-truth members FROM THE IFRAME REALM (pristine, since
        // the instrument hooks only the main realm): expected arity/name come
        // from these.
        const nativeAppendChild = iwin.Node.prototype.appendChild;
        const nativeDocWrite = iwin.document.write;
        const nativeWindowOpen = iwin.open;
        const nativeContentWindowGetter = Object.getOwnPropertyDescriptor(
            iwin.HTMLIFrameElement.prototype, "contentWindow"
        ).get;

        // record(key, fn) stores fn()'s boolean, or "error:<msg>" if it throws —
        // defensive PER PROBE so one hook's exception cannot blank the others.
        function record(key, fn) {
            try {
                results[key] = fn();
            } catch(e) {
                results[key] = "error:" + (e && e.message ? e.message : e);
            }
        }

        // The four checks for a hooked FUNCTION member, against the iframe-realm
        // native of the same member.
        function probeFn(prefix, hookedFn, nativeFn) {
            record(prefix + "_native", function() {
                return Function.prototype.toString.call(hookedFn)
                    .indexOf("[native code]") !== -1;
            });
            record(prefix + "_arity", function() {
                return hookedFn.length === nativeFn.length;
            });
            record(prefix + "_name", function() {
                return hookedFn.name === nativeFn.name;
            });
            record(prefix + "_xrealm_native", function() {
                return xToString.call(hookedFn).indexOf("[native code]") !== -1;
            });
        }

        probeFn("fp_appendChild", Node.prototype.appendChild, nativeAppendChild);
        probeFn("fp_docwrite", document.write, nativeDocWrite);
        probeFn("fp_window_open", window.open, nativeWindowOpen);

        // The contentWindow getter is an ACCESSOR, probed the same four ways.
        // Its cross-realm key is "fp_contentwindow_xrealm_native".
        const hookedContentWindowGetter = Object.getOwnPropertyDescriptor(
            HTMLIFrameElement.prototype, "contentWindow"
        ).get;
        record("fp_contentwindow_getter_native", function() {
            return Function.prototype.toString.call(hookedContentWindowGetter)
                .indexOf("[native code]") !== -1;
        });
        record("fp_contentwindow_getter_arity", function() {
            return hookedContentWindowGetter.length === nativeContentWindowGetter.length;
        });
        record("fp_contentwindow_getter_name", function() {
            return hookedContentWindowGetter.name === nativeContentWindowGetter.name;
        });
        record("fp_contentwindow_xrealm_native", function() {
            return xToString.call(hookedContentWindowGetter)
                .indexOf("[native code]") !== -1;
        });

        // Tidy up the probe iframe.
        frame.remove();
    }

    // Run all tests and store results, wrapping each in try/catch
    // so that one failing test doesn't prevent others from running
    function safeRun(name, fn) {
        try {
            results[name] = fn();
        } catch(e) {
            results[name] = false;
            results[name + "_error"] = e.message;
        }
    }

    safeRun("webdriver_flag", testWebdriverFlag);
    safeRun("canvas_functions_native", testCanvasFunctionsNative);
    safeRun("storage_functions_native", testStorageFunctionsNative);
    safeRun("navigator_native", testNavigatorNative);
    safeRun("no_global_leaks", testNoGlobalLeaks);
    safeRun("constructors_present", testConstructorsPresent);
    safeRun("bind_integrity", testBindIntegrity);
    safeRun("clean_error_stacks", testCleanErrorStacks);
    safeRun("no_extra_prototype_properties", testNoExtraPrototypeProperties);
    safeRun("rtc_native", testRTCNative);
    safeRun("function_arity_native", testFunctionArityNative);
    safeRun("accessor_name_native", testAccessorNameNative);
    safeRun("no_instrument_helpers_leaked", testNoInstrumentHelpersLeaked);

    // D10: frame-protection / DOM-hook probes write their own per-key results
    // (see runFrameProtectionProbes); wrapped so a setup failure cannot abort
    // the page before the results blob is published.
    try {
        runFrameProtectionProbes();
    } catch(e) {
        results["frame_protection_probes_error"] = e.message;
    }

    // Write results to DOM for Selenium to read
    const resultsDiv = document.getElementById("results");
    resultsDiv.setAttribute("data-results", JSON.stringify(results));
    resultsDiv.textContent = JSON.stringify(results, null, 2);
    </script>
</body>
</html>
