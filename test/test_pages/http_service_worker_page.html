<html>
  <head>
    <title>HTTP Test page including a service worker</title>
    <link rel='icon' href='shared/test_favicon.ico' />
  </head>
  <body>
    <p> This test page registers a service worker that fetches an image
    during its activate phase.
    </p>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register(
          './shared/service_worker.js',
          {scope: './shared/'}
        ).then((reg) => {
          console.log('Registration succeeded. Scope is ' + reg.scope);
        }).catch((error) => {
          console.log('Registration failed with ' + error);
        });
      }
    </script>
    <script>
      var request = new Request(
        '/test_pages/shared/test_image.png'
      );
      fetch(request);
    </script>
  </body>
</html>
